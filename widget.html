<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>교사포털 위젯</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bd:#30363d;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;
  --blue:#58a6ff;--green:#3fb950;--yellow:#d29922;
  --red:#f85149;--purple:#bc8cff;--orange:#ffa657;
  --font:'Noto Sans KR',sans-serif;
}
html,body{width:400px;font-family:var(--font);background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;}
body{padding:10px;display:flex;flex-direction:column;gap:8px;}

.card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.card.blue::before{background:linear-gradient(90deg,var(--blue),transparent)}
.card.green::before{background:linear-gradient(90deg,var(--green),transparent)}
.card.purple::before{background:linear-gradient(90deg,var(--purple),transparent)}

.card-title{font-size:.68em;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;}
.dot-blue{background:var(--blue)}.dot-green{background:var(--green)}.dot-purple{background:var(--purple)}

/* 시계 */
#clockCard{text-align:center;padding:14px 14px 12px;}
#clockTime{font-size:3em;font-weight:800;letter-spacing:-2px;color:var(--tx);line-height:1;}
#clockDate{font-size:.78em;color:var(--tx2);margin-top:3px;}
#clockStatus{display:inline-block;margin-top:7px;padding:2px 10px;border-radius:20px;font-size:.72em;font-weight:600;background:var(--bg3);color:var(--blue);border:1px solid var(--bd);}

/* 시간표 */
.tt-row{display:flex;gap:5px;overflow-x:auto;}
.tt-row::-webkit-scrollbar{height:2px;}
.tt-row::-webkit-scrollbar-thumb{background:var(--bd);}
.tt-cell{flex-shrink:0;min-width:48px;padding:7px 5px;border-radius:7px;text-align:center;background:var(--bg3);border:1px solid var(--bd);font-size:.7em;}
.tt-cell.active{background:rgba(88,166,255,.15);border-color:var(--blue);color:var(--blue);}
.tt-cell.done{opacity:.35;}
.tt-cell .p-num{font-weight:700;font-size:1.1em;display:block;}
.tt-cell .p-cls{font-weight:600;color:var(--tx);margin-top:2px;display:block;font-size:.95em;}
.tt-cell .p-sub{color:var(--tx3);margin-top:1px;display:block;font-size:.88em;}
.tt-cell.empty .p-cls{color:var(--tx3);}

/* 급식 */
.meal-tabs{display:flex;gap:3px;margin-bottom:7px;}
.meal-tab{padding:2px 9px;border-radius:5px;font-size:.7em;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--tx2);border:1px solid transparent;transition:all .12s;}
.meal-tab.on{background:rgba(63,185,80,.12);color:var(--green);border-color:rgba(63,185,80,.4);}
.meal-list{display:flex;flex-wrap:wrap;gap:3px;}
.meal-item{font-size:.72em;padding:2px 7px;border-radius:4px;background:var(--bg3);color:var(--tx2);}
.meal-cal{font-size:.68em;color:var(--tx3);margin-top:5px;}

/* 주간업무 */
.ev-list{display:flex;flex-direction:column;gap:4px;}
.ev-item{display:flex;align-items:flex-start;gap:7px;padding:6px 9px;border-radius:6px;background:var(--bg3);border-left:3px solid var(--blue);}
.ev-dept{font-size:.66em;font-weight:700;white-space:nowrap;}
.ev-title{font-size:.75em;font-weight:500;word-break:keep-all;line-height:1.3;flex:1;}
.ev-time{font-size:.66em;color:var(--tx3);white-space:nowrap;margin-left:auto;padding-top:1px;}

.empty-msg{font-size:.75em;color:var(--tx3);padding:4px 0;}
.refresh-btn{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--tx3);cursor:pointer;font-size:.82em;padding:2px;transition:color .12s;}
.refresh-btn:hover{color:var(--tx);}
</style>
</head>
<body>

<div class="card blue" id="clockCard">
  <div id="clockTime">--:--</div>
  <div id="clockDate">---</div>
  <div id="clockStatus">로딩 중...</div>
</div>

<div class="card blue">
  <button class="refresh-btn" onclick="loadAll()" title="새로고침">↺</button>
  <div class="card-title"><span class="dot dot-blue"></span>오늘 시간표</div>
  <div class="tt-row" id="ttRow"><div class="empty-msg">불러오는 중...</div></div>
</div>

<div class="card green">
  <div class="card-title"><span class="dot dot-green"></span>오늘 급식</div>
  <div class="meal-tabs" id="mealTabs"></div>
  <div id="mealContent"><div class="empty-msg">불러오는 중...</div></div>
</div>

<div class="card purple">
  <div class="card-title"><span class="dot dot-purple"></span>오늘 주간업무</div>
  <div id="weeklyContent"><div class="empty-msg">불러오는 중...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG={apiKey:"AIzaSyAIL9zYAkt_VKPck7FaMuHTFc6ALMeIp7k",authDomain:"gbgigo-portal.firebaseapp.com",projectId:"gbgigo-portal",storageBucket:"gbgigo-portal.firebasestorage.app",messagingSenderId:"276912850692",appId:"1:276912850692:web:7567b8af1cee85e2c9f251"};
var db=null;
try{if(!firebase.apps.length)firebase.initializeApp(FIREBASE_CONFIG);db=firebase.firestore();}catch(e){}

var NEIS_KEY='090d1bde6d4d4e44a10ab8b7c1e43b39',OFFICE='R10',SCHOOL_CODE=null;
function pad(n){return String(n).padStart(2,'0');}
function ymd(d){return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());}

function ensureCode(cb){
  if(SCHOOL_CODE){cb();return;}
  var c=localStorage.getItem('w-sc');if(c){SCHOOL_CODE=c;cb();return;}
  fetch('https://open.neis.go.kr/hub/schoolInfo?KEY='+NEIS_KEY+'&Type=json&pIndex=1&pSize=5&ATPT_OFCDC_SC_CODE='+OFFICE+'&SCHUL_NM='+encodeURIComponent('경북기계금속고등학교'))
    .then(function(r){return r.json();}).then(function(d){
      try{SCHOOL_CODE=d.schoolInfo[1].row[0].SD_SCHUL_CODE;localStorage.setItem('w-sc',SCHOOL_CODE);}catch(e){}cb();
    }).catch(function(){cb();});
}

var PT=[{s:'08:50',e:'09:40'},{s:'09:50',e:'10:40'},{s:'10:50',e:'11:40'},{s:'11:50',e:'12:40'},{s:'13:30',e:'14:20'},{s:'14:30',e:'15:20'},{s:'15:30',e:'16:20'}];
var DP={월:7,화:7,수:6,목:6,금:6};
var DAYS=['월','화','수','목','금'];
var DAY_BASE={월:0,화:7,수:14,목:20,금:26};

function nowP(){
  var t=new Date(),n=t.getHours()*60+t.getMinutes();
  for(var i=0;i<PT.length;i++){var s=PT[i].s.split(':'),e=PT[i].e.split(':');if(n>=+s[0]*60+ +s[1]&&n<=+e[0]*60+ +e[1])return i;}
  return -1;
}
function isPast(p){var t=new Date(),n=t.getHours()*60+t.getMinutes(),e=PT[p].e.split(':');return n>+e[0]*60+ +e[1];}
function todayName(){return['','월','화','수','목','금',''][new Date().getDay()]||'';}

// 시계
function updateClock(){
  var now=new Date();
  var hh=pad(now.getHours()),mm=pad(now.getMinutes());
  document.getElementById('clockTime').textContent=hh+':'+mm;
  var days=['일','월','화','수','목','금','토'];
  document.getElementById('clockDate').textContent=(now.getMonth()+1)+'월 '+now.getDate()+'일 ('+days[now.getDay()]+'요일)';
  var np=nowP(),t=now.getHours()*60+now.getMinutes(),st='';
  if(np>=0)st=(np+1)+'교시 수업 중 · '+PT[np].e+' 종료';
  else if(t<530)st='출근 전';
  else if(t<550)st='등교 시간';
  else{
    var f=false;
    for(var i=0;i<PT.length;i++){var s=PT[i].s.split(':');if(t<+s[0]*60+ +s[1]){st=(i+1)+'교시 '+PT[i].s+' 시작';f=true;break;}}
    if(!f)st='수업 종료';
  }
  document.getElementById('clockStatus').textContent=st;
}

// 시간표
function loadTimetable(){
  var el=document.getElementById('ttRow');
  var dn=todayName();
  if(!dn){el.innerHTML='<div class="empty-msg">주말 🎉</div>';return;}
  var cached=localStorage.getItem('cache-TD_A'),cs=localStorage.getItem('cache-CS_A');
  if(!cached){el.innerHTML='<div class="empty-msg">포털에 먼저 로그인하세요</div>';return;}
  try{
    var TD=JSON.parse(cached),CS=JSON.parse(cs||'{}');
    var sess=localStorage.getItem('gm-session-v2');
    var user=sess?JSON.parse(sess).n:null;
    if(!user){el.innerHTML='<div class="empty-msg">포털에 먼저 로그인하세요</div>';return;}
    var td=TD[user];
    if(!td){el.innerHTML='<div class="empty-msg">시간표 없음</div>';return;}
    var maxP=DP[dn]||6,np=nowP(),base=DAY_BASE[dn]||0,h='';
    for(var p=0;p<maxP;p++){
      var si=base+p,cl=td.s[si]||null,sj='';
      if(cl&&CS[cl]&&CS[cl][dn])sj=CS[cl][dn][p]||'';
      var cls='tt-cell'+(p===np?' active':isPast(p)?' done':'')+(cl?'':' empty');
      h+='<div class="'+cls+'"><span class="p-num">'+(p+1)+'</span>';
      h+='<span class="p-cls">'+(cl?cl.replace(/^\d/,''):'—')+'</span>';
      if(sj)h+='<span class="p-sub">'+sj+'</span>';
      h+='</div>';
    }
    el.innerHTML=h;
  }catch(e){el.innerHTML='<div class="empty-msg">오류</div>';}
}

// 급식
var mealsData={},curTab='';
var mTypes=['조식','중식','석식'],mIcons={조식:'🌅',중식:'☀️',석식:'🌙'};
function loadMeals(){
  var today=ymd(new Date());
  ensureCode(function(){
    if(!SCHOOL_CODE){document.getElementById('mealContent').innerHTML='<div class="empty-msg">급식 없음</div>';return;}
    fetch('https://open.neis.go.kr/hub/mealServiceDietInfo?KEY='+NEIS_KEY+'&Type=json&pIndex=1&pSize=10&ATPT_OFCDC_SC_CODE='+OFFICE+'&SD_SCHUL_CODE='+SCHOOL_CODE+'&MLSV_FROM_YMD='+today+'&MLSV_TO_YMD='+today)
      .then(function(r){return r.json();}).then(function(data){
        try{
          mealsData={};
          data.mealServiceDietInfo[1].row.forEach(function(r){
            var items=r.DDISH_NM.replace(/<br\/>/g,'\n').split('\n').map(function(s){return s.replace(/\d+\.\s*/g,'').replace(/[()]/g,'').trim();}).filter(function(s){return s;});
            mealsData[r.MMEAL_SC_NM]={items:items,cal:r.CAL_INFO};
          });
          var h=new Date().getHours();
          curTab=h<10?'조식':h<14?'중식':'석식';
          if(!mealsData[curTab])curTab=Object.keys(mealsData)[0]||'';
          renderMealTabs();renderMeal(curTab);
        }catch(e){
          document.getElementById('mealContent').innerHTML='<div class="empty-msg">오늘 급식 없음</div>';
          document.getElementById('mealTabs').innerHTML='';
        }
      }).catch(function(){document.getElementById('mealContent').innerHTML='<div class="empty-msg">로드 실패</div>';});
  });
}
function renderMealTabs(){
  var h='';
  mTypes.forEach(function(t){if(!mealsData[t])return;h+='<div class="meal-tab'+(t===curTab?' on':'')+'" onclick="switchMeal(\''+t+'\')">'+mIcons[t]+' '+t+'</div>';});
  document.getElementById('mealTabs').innerHTML=h;
}
function switchMeal(t){curTab=t;renderMealTabs();renderMeal(t);}
function renderMeal(t){
  var m=mealsData[t];
  if(!m){document.getElementById('mealContent').innerHTML='<div class="empty-msg">없음</div>';return;}
  var h='<div class="meal-list">';
  m.items.forEach(function(i){h+='<span class="meal-item">'+i+'</span>';});
  h+='</div>';
  if(m.cal)h+='<div class="meal-cal">🔥 '+m.cal+'</div>';
  document.getElementById('mealContent').innerHTML=h;
}

// 주간업무
function loadWeekly(){
  var el=document.getElementById('weeklyContent');
  var today=ymd(new Date());
  var cached=null;
  try{var r=localStorage.getItem('weekly-public-events-v2');if(r){var p=JSON.parse(r);if(p&&p.events)cached=p.events;}}catch(e){}
  if(cached)renderWeekly(cached,today);
  if(db){
    db.collection('portal').doc('weekly-events').get().then(function(doc){
      if(doc.exists&&doc.data()&&doc.data().events){
        var evs=doc.data().events;
        try{localStorage.setItem('weekly-public-events-v2',JSON.stringify({savedAt:Date.now(),events:evs}));}catch(e){}
        renderWeekly(evs,today);
      }else if(!cached){el.innerHTML='<div class="empty-msg">오늘 일정 없음</div>';}
    }).catch(function(){if(!cached)el.innerHTML='<div class="empty-msg">로드 실패</div>';});
  }else if(!cached){el.innerHTML='<div class="empty-msg">Firebase 연결 안됨</div>';}
}
function renderWeekly(evs,today){
  var el=document.getElementById('weeklyContent');
  var f=evs.filter(function(ev){var s=ev.start?ev.start.slice(0,10).replace(/-/g,''):'',e=ev.end?ev.end.slice(0,10).replace(/-/g,''):'';return s<=today&&e>=today;});
  f.sort(function(a,b){return(a.isAllDay&&!b.isAllDay)?-1:(!a.isAllDay&&b.isAllDay)?1:new Date(a.start)-new Date(b.start);});
  if(!f.length){el.innerHTML='<div class="empty-msg">오늘 일정 없음</div>';return;}
  var h='<div class="ev-list">';
  f.forEach(function(ev){
    var title=ev.title?ev.title.replace(/\[[^\]]+\]\s*/,''):'';
    var color=ev.departmentColor||'var(--blue)';
    var time=ev.isAllDay?'종일':(function(){var st=new Date(ev.start),et=new Date(ev.end);return pad(st.getHours())+':'+pad(st.getMinutes())+'~'+pad(et.getHours())+':'+pad(et.getMinutes());})();
    h+='<div class="ev-item" style="border-left-color:'+color+'">';
    h+='<div style="flex:1;min-width:0"><div class="ev-dept" style="color:'+color+'">'+ev.department+'</div><div class="ev-title">'+title+'</div></div>';
    h+='<div class="ev-time">'+time+'</div></div>';
  });
  el.innerHTML=h+'</div>';
}

function loadAll(){loadTimetable();loadMeals();loadWeekly();}

setInterval(updateClock,1000);
setInterval(loadAll,5*60*1000);
updateClock();
loadAll();
</script>
</body>
</html>
