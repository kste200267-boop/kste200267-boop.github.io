<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>경북기계금속고등학교 주간 계획</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
.print-head{display:none}
.print-sub{display:none}
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#ffffff;--bg2:#f8f9fa;--bg3:#f1f3f4;--tx:#202124;--tx2:#5f6368;--tx3:#80868b;--bd:#dadce0;--blue:#1a73e8;--blue-bg:#e8f0fe;--red:#e53935;--font:'Noto Sans KR',sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1e1e1e;--bg2:#2d2d2d;--bg3:#3c3c3c;--tx:#e8eaed;--tx2:#9aa0a6;--tx3:#71767b;--bd:#444;--blue:#8ab4f8;--blue-bg:#1a3a5c;--red:#f28b82}}
body{font-family:var(--font);background:var(--bg2);color:var(--tx);-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}

.wrap{max-width:1400px;margin:0 auto;padding:12px 16px}
.header{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.02em}
.header small{font-size:12px;color:var(--tx2)}
.btn{padding:6px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);font-size:12px;color:var(--tx)}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border:none;font-weight:600}
.btn-primary:hover{opacity:0.9}
.btn-sm{padding:3px 7px;font-size:10px;font-weight:500;border-radius:4px}
.btn-active{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sort-active{background:#455A64;color:#fff;border-color:#455A64}
.btn-edit{background:#f57c00;color:#fff;border:none;font-weight:600}
.btn-edit:hover{opacity:0.9}
.btn-logout{background:transparent;border:1px solid var(--bd);color:var(--tx2);font-size:11px}

/* 관리자 모드 배너 */
.admin-bar{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:6px;background:#E8F5E9;border:1px solid #A5D6A7;font-size:11px;color:#2E7D32;margin-bottom:10px}
.viewer-bar{display:none} /* 뷰어 모드엔 배너 없음 */

.nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.nav-left{display:flex;align-items:center;gap:6px}
.nav-right{display:flex;gap:3px;align-items:center}
.nav-arrow{width:30px;height:30px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--tx)}
.period-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--bd);background:var(--bg);font-size:13px;font-weight:600;color:var(--tx);position:relative}
.sep{width:1px;height:24px;background:var(--bd);margin:0 3px}

.filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.filter-chip{padding:3px 7px;border-radius:4px;border:1px solid var(--bd);background:var(--bg);font-size:10px;font-weight:500;color:var(--tx2);opacity:0.5;transition:all .15s}
.filter-chip.on{opacity:1;color:#fff;border-color:transparent}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:6px;margin-bottom:12px}
.stat{background:var(--bg);border-radius:8px;padding:8px 10px;text-align:center;border:1px solid var(--bd)}
.stat-label{font-size:10px;color:var(--tx2)}
.stat-val{font-size:18px;font-weight:600}

.week-grid{display:grid;grid-template-columns:repeat(7,minmax(80px,1fr));border:1px solid var(--bd);border-radius:8px;overflow-x:auto;width:100%}
.day-col{border-right:1px solid var(--bd);min-height:220px;display:flex;flex-direction:column}
.day-col:last-child{border-right:none}
.day-head{text-align:center;padding:6px 2px;border-bottom:1px solid var(--bd);background:var(--bg2)}
.day-head.today{background:var(--blue)}
.day-head.today .day-name,.day-head.today .day-num{color:#fff!important}
.day-head.weekend .day-name{color:var(--red)}
.day-name{font-size:10px;font-weight:500;color:var(--tx2)}
.day-num{font-size:15px;font-weight:600;color:var(--tx)}
.day-body{padding:6px 5px;flex:1;background:var(--bg)}

.ev{display:flex;align-items:flex-start;gap:6px;padding:6px 8px;border-radius:0 4px 4px 0;margin-bottom:6px;background:var(--bg);border-left:3px solid;transition:background .1s}
.ev.clickable{cursor:pointer}
.ev.clickable:hover{background:var(--bg2)}
.ev-time{font-size:11px;font-weight:500;color:var(--tx2);min-width:36px;flex-shrink:0;padding-top:1px}
.ev-allday{font-size:10px;font-weight:500;color:var(--blue);min-width:36px;flex-shrink:0}
.ev-body{flex:1;min-width:0}
.ev-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;color:#fff;white-space:nowrap}
.loc-tag{font-size:9px;color:var(--tx3);white-space:normal;word-break:keep-all}
.ev-title{font-size:12px;font-weight:500;margin-top:2px;white-space:normal;overflow:visible;text-overflow:clip;word-break:keep-all;line-height:1.3}

.month-grid{border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.month-header{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg2);border-bottom:1px solid var(--bd)}
.month-header div{text-align:center;padding:6px;font-size:11px;font-weight:500;color:var(--tx2)}
.month-header .we{color:var(--red)}
.month-row{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--bd)}
.month-row:last-child{border-bottom:none}
.month-cell{min-height:80px;padding:4px;border-right:1px solid var(--bd);background:var(--bg);cursor:pointer}
.month-cell:last-child{border-right:none}
.month-cell.other{opacity:0.3}
.month-cell.today{background:var(--blue-bg)}
.month-cell .date{font-size:11px;text-align:right;padding-right:2px;margin-bottom:3px}
.month-cell.today .date{font-weight:700;color:var(--blue)}
.month-ev{font-size:9px;padding:1px 3px;margin-bottom:1px;border-radius:2px;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.venue-section{margin-top:20px}
.venue-title{font-size:14px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid var(--bd)}
.venue-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}
.venue-card{border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:var(--bg)}
.venue-head{padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.venue-name{font-size:12px;font-weight:600}
.venue-count{font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.venue-body{padding:6px}
.venue-ev{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:4px;cursor:pointer;margin-bottom:3px}
.venue-ev:hover{background:var(--bg2)}
.venue-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.venue-ev-title{font-size:11px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.venue-ev-time{font-size:10px;color:var(--tx3)}

.picker{position:absolute;top:100%;left:0;z-index:100;margin-top:4px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px;width:260px;box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.picker-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.picker-year{font-size:14px;font-weight:600}
.picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.picker-month{padding:8px 4px;border-radius:6px;border:none;font-size:13px;cursor:pointer;background:transparent;color:var(--tx)}
.picker-month.cur{background:var(--blue);color:#fff;font-weight:600}

/* 로그인 모달 */
.login-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:2000;padding:16px}
.login-box{background:var(--bg);border-radius:14px;padding:24px;width:100%;max-width:360px;text-align:center}
.login-box h2{font-size:17px;font-weight:700;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--tx2);margin-bottom:18px;line-height:1.5}
.login-google-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;transition:background .15s}
.login-google-btn:hover{background:var(--bg2)}
.login-cancel{margin-top:10px;font-size:12px;color:var(--tx3);cursor:pointer;text-decoration:underline;background:none;border:none}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:var(--bg);border-radius:12px;width:100%;max-height:90vh;overflow:auto;padding:20px}
.modal-sm{max-width:400px}
.modal-md{max-width:480px}
.modal-title{font-size:15px;font-weight:600}
.form-label{font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:3px;display:block}
.form-input{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;font-size:13px;background:var(--bg);color:var(--tx);box-sizing:border-box}
.form-row{display:flex;gap:8px}
.form-row>div{flex:1}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:8px;background:#323232;color:#fff;font-size:13px;font-weight:500;z-index:3000}

@media(max-width:768px){
  .week-grid{grid-template-columns:repeat(7,minmax(0,1fr))}
  .ev{padding:3px 5px}
  .ev-time,.ev-allday{display:none}
  .badge{font-size:8px;padding:1px 3px}
  .ev-title{font-size:10px}
  .stat-val{font-size:15px}
}

@media print{
  .today{background:transparent!important}
  .day-head.today{background:transparent!important}
  .day-head.today .day-name,.day-head.today .day-num{color:#000!important}
  .print-head{display:block!important;text-align:center;font-size:20px;font-weight:700;margin-bottom:2mm;color:#000!important}
  .print-sub{display:block!important;text-align:center;font-size:12px;font-weight:600;margin-bottom:4mm;color:#000!important}
  @page{size:A4 landscape;margin:4mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  html,body{width:100%;height:100%;margin:0!important;padding:0!important;background:#fff!important}
  body{background:#fff!important}
  .wrap{max-width:none!important;width:100%!important;margin:0!important;padding:0!important}
  .header,.nav,.filters,.stats,.toast,.modal-overlay,.admin-bar,.login-modal{display:none!important}
  .week-grid,.month-grid,.venue-section{break-inside:avoid;page-break-inside:avoid}
  .week-grid{width:100%!important;grid-template-columns:repeat(7,1fr)!important;overflow:visible!important;border:2px solid #000!important}
  .day-col{min-height:180px!important}
  .day-body{overflow:hidden}
  .ev{break-inside:avoid;page-break-inside:avoid;background:#fff!important;border-left-width:6px!important;font-size:10px!important;padding:3px 4px!important}
  .ev-title{font-size:10px!important;white-space:normal!important;overflow:visible!important;text-overflow:clip!important;word-break:keep-all;line-height:1.25}
  .badge{color:#fff!important;font-weight:700!important}
  .ev-time,.ev-allday{font-size:10px!important}
  .day-head{padding:4px 2px!important}
  .day-name{font-size:9px!important}
  .day-num{font-size:13px!important}
}
</style>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
var CLIENT_ID = '243121397435-jlu52hqe8or79msoqj5qkrpuop9o1f0d.apps.googleusercontent.com';
var SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/calendar.events';
var SCHOOL_CALENDAR_NAME = '경북기계금속고';
var CALENDAR_ID = null;
var CACHE_KEY_PREFIX = 'weekly-cache-v4:';
var CACHE_TTL_MS = 5 * 60 * 1000;
var PUBLIC_CACHE_KEY = 'weekly-public-events-v2';
var PUBLIC_CACHE_TTL = 30 * 60 * 1000; // 30분

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
var state = {
  // 모드: 'viewer' = 로그인 없이 읽기 / 'admin' = 로그인 후 수정 가능
  mode_auth: 'viewer',
  accessToken: null,

  loading: true,
  events: [],
  departments: JSON.parse(localStorage.getItem('departments') || 'null') || [
    {name:'교장',keywords:['교장'],color:'#5C6BC0',order:0},
    {name:'교감',keywords:['교감'],color:'#3949AB',order:1},
    {name:'협약기획부',keywords:['협약기획부','협약기획','협약','기획'],color:'#8E24AA',order:2},
    {name:'교무부',keywords:['교무부','교무','수업','시간표','학적','성적','평가'],color:'#0F9D58',order:3},
    {name:'연구부',keywords:['연구부','연구','연수','수업연구','교육과정'],color:'#43A047',order:4},
    {name:'학생안전부',keywords:['학생안전부','학생안전','생활지도','학교폭력','도박예방','안전','출결','생활교육'],color:'#1E88E5',order:5},
    {name:'행복지원부',keywords:['행복지원부','행복지원','복지','정서지원','회복'],color:'#00ACC1',order:6},
    {name:'취업지원부',keywords:['취업지원부','취업지원','취업','채용','면접','산학','현장실습'],color:'#FB8C00',order:7},
    {name:'인재개발부',keywords:['인재개발부','인재개발','인재','역량','워크숍'],color:'#F4511E',order:8},
    {name:'교육정보부',keywords:['교육정보부','교육정보','정보','NEIS','정보화','방송','전산'],color:'#00897B',order:9},
    {name:'입시홍보부',keywords:['입시홍보부','입시홍보','입시','홍보','설명회'],color:'#6D4C41',order:10},
    {name:'진로상담부',keywords:['진로상담부','진로상담','진로','상담','진학'],color:'#F4B400',order:11},
    {name:'도제교육부',keywords:['도제교육부','도제교육','도제','학습근로'],color:'#DB4437',order:12},
    {name:'스마트용접과',keywords:['스마트용접과','용접과','스마트용접'],color:'#7CB342',order:13},
    {name:'융합기계과',keywords:['융합기계과','융합기계'],color:'#C0CA33',order:14},
    {name:'스마트금형과',keywords:['스마트금형과','금형과','스마트금형'],color:'#8D6E63',order:15},
    {name:'용접기술센터',keywords:['용접기술센터','기술센터'],color:'#546E7A',order:16},
    {name:'행정실',keywords:['행정실','행정','예산','회계','계약'],color:'#6A1B9A',order:17},
    {name:'급식실',keywords:['급식실','급식','배식'],color:'#EF6C00',order:18}
  ],
  locations: JSON.parse(localStorage.getItem('locations') || 'null') || ['본동 세미나실','기숙사 세미나실','계정아트홀','강당(계정 명품관 2층)'],
  baseDate: new Date(),
  view_mode: 'week',
  sort: 'dept',
  activeDepts: null,
  showForm: false,
  showMgr: false,
  showPicker: false,
  showLoginModal: false,
  editEv: null,
  toast: null
};

function isAdmin(){ return state.mode_auth === 'admin'; }
function saveDepts(){ localStorage.setItem('departments', JSON.stringify(state.departments)); }
function saveLocs(){ localStorage.setItem('locations', JSON.stringify(state.locations)); }

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
var DAY_NAMES = ['월','화','수','목','금','토','일'];
function pad(n){return String(n).padStart(2,'0')}
function fmtTime(d){var x=new Date(d);return pad(x.getHours())+':'+pad(x.getMinutes())}
function fmtDate(d){var x=new Date(d);return (x.getMonth()+1)+'/'+x.getDate()}
function dayIdx(d){return (new Date(d).getDay()+6)%7}
function isToday(d){return new Date(d).toDateString()===new Date().toDateString()}
function getMonday(dt){var d=new Date(dt);d.setDate(d.getDate()-((d.getDay()+6)%7));d.setHours(0,0,0,0);return d}
function getWeekNum(dt){
  var d=new Date(dt);
  var firstDay=new Date(d.getFullYear(),d.getMonth(),1);
  var firstMonday=new Date(firstDay);
  firstMonday.setDate(firstDay.getDate()+((8-firstDay.getDay())%7));
  var currentMonday=getMonday(d);
  var diff=currentMonday-firstMonday;
  var week=Math.floor(diff/(1000*60*60*24*7))+1;
  return week<1?1:week;
}
function getWeekRange(dt){var m=getMonday(dt),s=new Date(m);s.setDate(m.getDate()+6);s.setHours(23,59,59,999);return{start:m,end:s}}
function getMonthRange(y,m){return{start:new Date(y,m,1),end:new Date(y,m+1,0,23,59,59,999)}}
function getWeeksInMonth(y,m){var last=new Date(y,m+1,0),ws=[];var c=getMonday(new Date(y,m,1));while(c<=last){var e=new Date(c);e.setDate(c.getDate()+6);ws.push({start:new Date(c),end:e});c.setDate(c.getDate()+7)}return ws}
function cleanTitle(t){return t.replace(/\[[^\]]+\]\s*/,'')}

function classifyEvent(title, description, location){
  // ★ [부서명] 형식이 있으면 무조건 최우선
  var bracketMatch=(title||'').match(/^\[([^\]]+)\]/);
  if(bracketMatch){
    var bname=bracketMatch[1];
    for(var i=0;i<state.departments.length;i++){
      if(state.departments[i].name===bname)return state.departments[i];
    }
  }
  // 없으면 키워드 매칭
  var text=[title||'',description||'',location||''].join(' ').toLowerCase();
  var best=null,bestScore=0;
  for(var i=0;i<state.departments.length;i++){
    var d=state.departments[i],score=0;
    for(var j=0;j<d.keywords.length;j++){
      var kw=d.keywords[j].toLowerCase();
      if(text.indexOf(kw)>=0)score+=kw.length;
    }
    if(score>bestScore){bestScore=score;best=d}
  }
  return best||state.departments[0];
}
// ═══════════════════════════════════════════════════════════
// PUBLIC CACHE (Firebase에서 캘린더 데이터 공유)
// ═══════════════════════════════════════════════════════════
function savePublicEvents(events){
  try{
    localStorage.setItem(PUBLIC_CACHE_KEY, JSON.stringify({
      savedAt: Date.now(),
      events: events
    }));
  }catch(e){}
  // Firebase에도 저장 (뷰어들이 읽을 수 있도록)
  if(_wkDb){
    _wkDb.collection('portal').doc('weekly-events').set({
      events: events,
      updated: new Date().toISOString()
    }).catch(function(){});
  }
}

function loadPublicEventsFromCache(){
  try{
    var raw=localStorage.getItem(PUBLIC_CACHE_KEY);
    if(!raw)return null;
    var parsed=JSON.parse(raw);
    if(!parsed||!parsed.savedAt)return null;
    if(Date.now()-parsed.savedAt>PUBLIC_CACHE_TTL)return null;
    return parsed;
  }catch(e){return null}
}

// Firebase에서 공개 이벤트 로드 (뷰어 모드)
function loadPublicEventsFromFirebase(cb){
  if(!_wkDb){cb(null);return}
  _wkDb.collection('portal').doc('weekly-events').get().then(function(doc){
    if(doc.exists && doc.data().events){
      cb(doc.data().events);
    }else{
      cb(null);
    }
  }).catch(function(){cb(null)});
}

function initViewerMode(){
  state.mode_auth = 'viewer';
  state.loading = true;
  render();

  // 1. 로컬 캐시 우선
  var cached = loadPublicEventsFromCache();
  if(cached && cached.events && cached.events.length){
    state.events = cached.events;
    state.loading = false;
    if(!state.activeDepts) state.activeDepts = state.departments.map(function(d){return d.name});
    render();
    return;
  }

  // 2. Firebase에서 로드
  loadPublicEventsFromFirebase(function(events){
    if(events && events.length){
      state.events = events;
      localStorage.setItem(PUBLIC_CACHE_KEY, JSON.stringify({savedAt:Date.now(),events:events}));
    }else{
      state.events = [];
    }
    if(!state.activeDepts) state.activeDepts = state.departments.map(function(d){return d.name});
    state.loading = false;
    render();
  });
}

// ═══════════════════════════════════════════════════════════
// GOOGLE AUTH (관리자 로그인)
// ═══════════════════════════════════════════════════════════
var tokenClient = null;
var _gisReady = false;

function initGIS(){
  _gisReady = true;
  if(CLIENT_ID.indexOf('YOUR_')===0) return;

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(resp){
      if(resp.error){
        showToast('로그인에 실패했습니다.');
        state.showLoginModal = false;
        render();
        return;
      }
      state.accessToken = resp.access_token;
      state.mode_auth = 'admin';
      state.showLoginModal = false;
      sessionStorage.setItem('gtoken', state.accessToken);
      showToast('관리자 로그인 완료');
      startAdminCalendarLoad();
    }
  });

  // 세션에 토큰이 있으면 자동으로 관리자 모드
  var saved = sessionStorage.getItem('gtoken');
  if(saved){
    state.accessToken = saved;
    state.mode_auth = 'admin';
    startAdminCalendarLoad();
  }else{
    initViewerMode();
  }
}

function doAdminLogin(){
  if(!_gisReady || !tokenClient){
    showToast('로그인 기능을 불러오는 중입니다. 잠시 후 다시 시도하세요.');
    return;
  }
  tokenClient.requestAccessToken();
}

function doLogout(){
  sessionStorage.removeItem('gtoken');
  state.accessToken = null;
  state.mode_auth = 'viewer';
  state.showLoginModal = false;
  showToast('로그아웃되었습니다.');
  initViewerMode();
}

// ═══════════════════════════════════════════════════════════
// CALENDAR API (관리자 전용)
// ═══════════════════════════════════════════════════════════
function apiGet(url,cb){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url);
  xhr.setRequestHeader('Authorization','Bearer '+state.accessToken);
  xhr.timeout=10000;
  xhr.onload=function(){
    if(xhr.status===401){
      sessionStorage.removeItem('gtoken');
      state.mode_auth='viewer';
      initViewerMode();
      showToast('세션이 만료되었습니다. 다시 로그인하세요.');
      return;
    }
    try{cb(JSON.parse(xhr.responseText||'{}'))}catch(e){cb({error:'parse'})}
  };
  xhr.onerror=function(){cb({error:'network'})};
  xhr.ontimeout=function(){cb({error:'timeout'})};
  xhr.send();
}
function apiPost(url,body,cb){var xhr=new XMLHttpRequest();xhr.open('POST',url);xhr.setRequestHeader('Authorization','Bearer '+state.accessToken);xhr.setRequestHeader('Content-Type','application/json');xhr.onload=function(){cb(JSON.parse(xhr.responseText))};xhr.onerror=function(){cb({error:'network'})};xhr.send(JSON.stringify(body))}
function apiPatch(url,body,cb){var xhr=new XMLHttpRequest();xhr.open('PATCH',url);xhr.setRequestHeader('Authorization','Bearer '+state.accessToken);xhr.setRequestHeader('Content-Type','application/json');xhr.onload=function(){cb(JSON.parse(xhr.responseText))};xhr.send(JSON.stringify(body))}
function apiDelete(url,cb){var xhr=new XMLHttpRequest();xhr.open('DELETE',url);xhr.setRequestHeader('Authorization','Bearer '+state.accessToken);xhr.onload=function(){cb({})};xhr.send()}

function findSchoolCalendar(cb){
  apiGet('https://www.googleapis.com/calendar/v3/users/me/calendarList',function(data){
    if(data.error||!data.items){cb(null);return}
    var found=null;
    for(var i=0;i<data.items.length;i++){
      var cal=data.items[i];
      var name=(cal.summary||'').trim();
      if(name===SCHOOL_CALENDAR_NAME||name.indexOf(SCHOOL_CALENDAR_NAME)>=0){found=cal;break}
    }
    cb(found);
  });
}

function startAdminCalendarLoad(){
  state.loading = true;
  render();
  findSchoolCalendar(function(cal){
    if(!cal){
      showToast('"'+SCHOOL_CALENDAR_NAME+'" 캘린더를 찾지 못했습니다.');
      state.loading=false;
      render();
      return;
    }
    CALENDAR_ID=cal.id;
    loadAdminEvents();
  });
}

function loadAdminEvents(){
  if(!CALENDAR_ID){state.loading=false;render();return}
  state.loading=true;
  render();

  var range=state.view_mode==='week'
    ?getWeekRange(state.baseDate)
    :getMonthRange(state.baseDate.getFullYear(),state.baseDate.getMonth());
  var tMin=new Date(range.start);
  var tMax=new Date(range.end);
  tMin.setDate(tMin.getDate()-7);
  tMax.setDate(tMax.getDate()+7);

  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CALENDAR_ID)+
    '/events?timeMin='+encodeURIComponent(tMin.toISOString())+
    '&timeMax='+encodeURIComponent(tMax.toISOString())+
    '&singleEvents=true&orderBy=startTime&maxResults=1000';

  apiGet(url,function(data){
    if(data.error){state.loading=false;render();return}
    state.events=(data.items||[]).map(function(ev){
      var dept=classifyEvent(ev.summary||'',ev.description||'',ev.location||'');
      var isAllDay=!!(ev.start&&ev.start.date);
      var endValue=isAllDay
        ?new Date(new Date(ev.end.date).getTime()-1000).toISOString()
        :(ev.end&&ev.end.dateTime?ev.end.dateTime:ev.start.dateTime);
      return{
        id:ev.id,title:ev.summary||'(제목 없음)',description:ev.description||'',
        location:ev.location||'',start:isAllDay?(ev.start.date+'T00:00:00'):ev.start.dateTime,
        end:endValue,isAllDay:isAllDay,department:dept.name,departmentColor:dept.color
      };
    });
    if(!state.activeDepts) state.activeDepts=state.departments.map(function(d){return d.name});
    // 관리자가 로드한 데이터를 공개 캐시에도 저장
    savePublicEvents(state.events);
    state.loading=false;
    render();
  });
}

function createEvent(data){
  var title=data.title;
  if(title.indexOf('[')!==0) title='['+data.department+'] '+title;
  var body={summary:title,description:data.description||'',location:data.location||''};
  if(data.isAllDay){body.start={date:data.start.slice(0,10)};body.end={date:data.end.slice(0,10)}}
  else{body.start={dateTime:data.start,timeZone:'Asia/Seoul'};body.end={dateTime:data.end,timeZone:'Asia/Seoul'}}
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CALENDAR_ID)+'/events';
  apiPost(url,body,function(){showToast('일정 추가 완료');loadAdminEvents()});
}

function updateEvent(eventId,data){
  var body={summary:data.title,description:data.description||'',location:data.location||''};
  if(data.isAllDay){body.start={date:data.start.slice(0,10)};body.end={date:data.end.slice(0,10)}}
  else{body.start={dateTime:data.start,timeZone:'Asia/Seoul'};body.end={dateTime:data.end,timeZone:'Asia/Seoul'}}
  var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CALENDAR_ID)+'/events/'+eventId;
  apiPatch(url,body,function(){showToast('일정 수정 완료');loadAdminEvents()});
}

function h(tag,attrs,children){
  var el=document.createElement(tag);
  if(attrs) for(var k in attrs){
    if(k==='style'&&typeof attrs[k]==='object'){for(var s in attrs[k])el.style[s]=attrs[k][s]}
    else if(k.indexOf('on')===0){el.addEventListener(k.slice(2).toLowerCase(),attrs[k])}
    else if(k==='className'){el.className=attrs[k]}
    else if(k==='innerHTML'){el.innerHTML=attrs[k]}
    else{el.setAttribute(k,attrs[k])}
  }
  if(children){
    if(!Array.isArray(children))children=[children];
    children.forEach(function(c){
      if(c==null)return;
      if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(c));
      else el.appendChild(c);
    });
  }
  return el;
}

function getFiltered(){

function getSorted(list){
  list=list.slice();
  if(state.sort==='time'){
    list.sort(function(a,b){return new Date(a.start)-new Date(b.start)});
  }else{
    list.sort(function(a,b){
      var da=state.departments.find(function(x){return x.name===a.department});
      var db=state.departments.find(function(x){return x.name===b.department});
      var oa=da?(da.order||0):999,ob=db?(db.order||0):999;
      if(oa!==ob)return oa-ob;
      return new Date(a.start)-new Date(b.start);
    });
  }
  return list;
}

function expandEventsForWeek(events,weekStart){
  var expanded=[];
  var weekEnd=new Date(weekStart);
  weekEnd.setDate(weekStart.getDate()+6);
  weekEnd.setHours(23,59,59,999);
  events.forEach(function(ev){
    var start=new Date(ev.start),end=new Date(ev.end);
    if(end<weekStart||start>weekEnd)return;
    var cur=new Date(start);cur.setHours(0,0,0,0);
    var last=new Date(end);last.setHours(0,0,0,0);
    var startDay=new Date(start);startDay.setHours(0,0,0,0);
    while(cur<=last){
      if(cur>=weekStart&&cur<=weekEnd){
        expanded.push({
          id:ev.id+'_'+cur.toISOString().slice(0,10),
          originId:ev.id,title:ev.title,description:ev.description,
          location:ev.location,start:ev.isAllDay?new Date(cur):new Date(ev.start),
          end:ev.isAllDay?new Date(cur):new Date(ev.end),isAllDay:ev.isAllDay,
          department:ev.department,departmentColor:ev.departmentColor,
          isContinued:cur.getTime()>startDay.getTime()
        });
      }
      cur.setDate(cur.getDate()+1);
    }
  });
  return expanded;
}

function renderWeekGrid(){
  var wrap=h('div',{className:'week-grid'});
  var mon=getMonday(state.baseDate);
  var sourceEvents=getSorted(getFiltered());
  var filtered=expandEventsForWeek(sourceEvents,mon);
  var byDay=Array.from({length:7},function(){return[]});
  filtered.forEach(function(ev){var d=dayIdx(ev.start);if(d>=0&&d<7)byDay[d].push(ev)});

  for(var i=0;i<7;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var td=isToday(d),we=i>=5;
    var col=h('div',{className:'day-col'});
    var head=h('div',{className:'day-head'+(td?' today':'')+(we?' weekend':'')});
    head.appendChild(h('div',{className:'day-name'},DAY_NAMES[i]));
    head.appendChild(h('div',{className:'day-num'},String(d.getDate())));
    col.appendChild(head);
    var body=h('div',{className:'day-body'});
    if(!byDay[i].length){
      body.appendChild(h('div',{style:{color:'var(--tx3)',fontSize:'11px',textAlign:'center',padding:'8px 0'}},'-'));
    }else{
      byDay[i].forEach(function(ev){body.appendChild(renderEventEl(ev))});
    }
    col.appendChild(body);
    wrap.appendChild(col);
  }
  return wrap;
}

  if(ev.isAllDay)el.appendChild(h('div',{className:'ev-allday'},'종일'));
  else el.appendChild(h('div',{className:'ev-time'},fmtTime(ev.start)));
  var body=h('div',{className:'ev-body'});
  var meta=h('div',{className:'ev-meta'});
  meta.appendChild(h('span',{className:'badge',style:{background:ev.departmentColor}},ev.department));
  if(ev.location)meta.appendChild(h('span',{className:'loc-tag'},'📍'+ev.location));
  body.appendChild(meta);
  body.appendChild(h('div',{className:'ev-title'},(ev.isContinued?'↳ ':'')+cleanTitle(ev.title)));
  el.appendChild(body);
  return el;
}

function renderMonthGrid(){
  var wrap=h('div',{className:'month-grid'});
  var header=h('div',{className:'month-header'});
  DAY_NAMES.forEach(function(d,i){header.appendChild(h('div',{className:i>=5?'we':''},d))});
  wrap.appendChild(header);
  var weeks=getWeeksInMonth(state.baseDate.getFullYear(),state.baseDate.getMonth());
  var filtered=getSorted(getFiltered());
  var evByDate={};
  filtered.forEach(function(ev){
    var start=new Date(ev.start),end=new Date(ev.end);
    var cur=new Date(start);cur.setHours(0,0,0,0);
    var last=new Date(end);last.setHours(0,0,0,0);
    while(cur<=last){var key=cur.toDateString();if(!evByDate[key])evByDate[key]=[];evByDate[key].push(ev);cur.setDate(cur.getDate()+1)}
  });
  weeks.forEach(function(w){
    var row=h('div',{className:'month-row'});
    for(var di=0;di<7;di++){
      var d=new Date(w.start);d.setDate(w.start.getDate()+di);
      var thisMonth=d.getMonth()===state.baseDate.getMonth();
      var td=isToday(d),evs=evByDate[d.toDateString()]||[];
      var cell=h('div',{className:'month-cell'+(thisMonth?'':' other')+(td?' today':'')});
      (function(dd){cell.addEventListener('click',function(){
        if(thisMonth){state.baseDate=dd;state.view_mode='week';isAdmin()?loadAdminEvents():initViewerMode()}
      })})(new Date(d));
      cell.appendChild(h('div',{className:'date'},String(d.getDate())));
      evs.slice(0,3).forEach(function(ev){cell.appendChild(h('div',{className:'month-ev',style:{background:ev.departmentColor}},cleanTitle(ev.title)))});
      if(evs.length>3)cell.appendChild(h('div',{style:{fontSize:'9px',color:'var(--tx3)',textAlign:'center'}},'+' +(evs.length-3)));
      row.appendChild(cell);
    }
    wrap.appendChild(row);
  });
  return wrap;
}

function renderVenueSection(){
  var filtered=getSorted(getFiltered()).filter(function(ev){
    var weekRange=getWeekRange(state.baseDate);
    var st=new Date(ev.start),ed=new Date(ev.end);
    return !(ed<weekRange.start||st>weekRange.end)&&!!ev.location;
  });
  var byVenue={};
  state.locations.forEach(function(loc){byVenue[loc]=[]});
  filtered.forEach(function(ev){if(!byVenue[ev.location])byVenue[ev.location]=[];byVenue[ev.location].push(ev)});
  var section=h('div',{className:'venue-section'});
  section.appendChild(h('div',{className:'venue-title'},'장소별 일정'));
  var grid=h('div',{className:'venue-grid'});
  Object.keys(byVenue).forEach(function(loc){
    var list=byVenue[loc];
    var card=h('div',{className:'venue-card'});
    var head=h('div',{className:'venue-head'});
    head.appendChild(h('div',{className:'venue-name'},loc));
    head.appendChild(h('div',{className:'venue-count',style:{background:list.length?'var(--blue-bg)':'var(--bg3)',color:list.length?'var(--blue)':'var(--tx3)'}},list.length+'건'));
    card.appendChild(head);
    var body=h('div',{className:'venue-body'});
    if(!list.length){body.appendChild(h('div',{style:{color:'var(--tx3)',fontSize:'11px',padding:'8px 0',textAlign:'center'}},'-'))}
    else{
      list.forEach(function(ev){
        var row=h('div',{
          className:'venue-ev',
          onClick:isAdmin()?function(){state.editEv=ev;state.showForm=true;render()}:undefined
        });
        row.appendChild(h('span',{className:'venue-dot',style:{background:ev.departmentColor}}));
        var box=h('div',{style:{flex:1,minWidth:0}});
        box.appendChild(h('div',{className:'venue-ev-title'},cleanTitle(ev.title)));
        box.appendChild(h('div',{className:'venue-ev-time'},ev.isAllDay?'종일':fmtDate(ev.start)+' '+fmtTime(ev.start)));
        row.appendChild(box);
        body.appendChild(row);
      });
    }
    card.appendChild(body);
    grid.appendChild(card);
  });
  section.appendChild(grid);
  return section;
}

function renderEventForm(){
  var ev=state.editEv;
  var overlay=h('div',{
    className:'modal-overlay',
    onClick:function(e){if(e.target===e.currentTarget){state.showForm=false;state.editEv=null;render()}}
  });
  var modal=h('div',{className:'modal modal-md'});
  var top=h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'14px'}});
  top.appendChild(h('span',{className:'modal-title'},ev?'일정 수정':'일정 추가'));
  top.appendChild(h('button',{className:'btn btn-sm',onClick:function(){state.showForm=false;state.editEv=null;render()}},'✕'));
  modal.appendChild(top);

  var form=h('div',{style:{display:'grid',gap:'10px'}});
  form.appendChild(h('div',null,[
    h('label',{className:'form-label'},'제목'),
    h('input',{className:'form-input',id:'f-title',value:ev?cleanTitle(ev.title):'',placeholder:'일정 제목'})
  ]));
  var row1=h('div',{className:'form-row'});
  var deptSel=h('select',{className:'form-input',id:'f-dept'});
  state.departments.forEach(function(d){var o=h('option',{value:d.name},d.name);if(ev&&ev.department===d.name)o.selected=true;deptSel.appendChild(o)});
  row1.appendChild(h('div',null,[h('label',{className:'form-label'},'부서'),deptSel]));
  var locSel=h('select',{className:'form-input',id:'f-loc'});
  locSel.appendChild(h('option',{value:''},'없음'));
  state.locations.forEach(function(l){var o=h('option',{value:l},l);if(ev&&ev.location===l)o.selected=true;locSel.appendChild(o)});
  locSel.appendChild(h('option',{value:'__c'},'직접 입력'));
  row1.appendChild(h('div',null,[h('label',{className:'form-label'},'장소'),locSel]));
  form.appendChild(row1);

  var dateVal=ev?new Date(ev.start).toISOString().slice(0,10):new Date().toISOString().slice(0,10);
  form.appendChild(h('div',null,[h('label',{className:'form-label'},'날짜'),h('input',{className:'form-input',type:'date',id:'f-date',value:dateVal})]));
  var allDayChk=h('input',{type:'checkbox',id:'f-allday'});
  if(ev&&ev.isAllDay)allDayChk.checked=true;
  form.appendChild(h('label',{style:{fontSize:'12px',display:'flex',alignItems:'center',gap:'6px',color:'var(--tx2)'}},[allDayChk,'종일']));
  var row2=h('div',{className:'form-row',id:'f-time-row'});
  row2.appendChild(h('div',null,[h('label',{className:'form-label'},'시작'),h('input',{className:'form-input',type:'time',id:'f-st',value:ev&&!ev.isAllDay?fmtTime(ev.start):'09:00'})]));
  row2.appendChild(h('div',null,[h('label',{className:'form-label'},'종료'),h('input',{className:'form-input',type:'time',id:'f-et',value:ev&&!ev.isAllDay?fmtTime(ev.end):'10:00'})]));
  form.appendChild(row2);
  allDayChk.addEventListener('change',function(){row2.style.display=allDayChk.checked?'none':'flex'});
  if(allDayChk.checked)row2.style.display='none';
  form.appendChild(h('div',null,[h('label',{className:'form-label'},'메모'),h('textarea',{className:'form-input',id:'f-desc',style:{minHeight:'50px',resize:'vertical'},innerHTML:ev?ev.description:''})]));

  var btns=h('div',{style:{display:'flex',gap:'8px'}});
  btns.appendChild(h('button',{
    className:'btn btn-primary',style:{flex:1,padding:'10px'},
    onClick:function(){
      var title=document.getElementById('f-title').value.trim();
      if(!title)return showToast('제목을 입력하세요.');
      var dept=document.getElementById('f-dept').value;
      var loc=document.getElementById('f-loc').value;
      if(loc==='__c')loc=prompt('장소 이름 입력:')||'';
      var date=document.getElementById('f-date').value;
      var allDay=document.getElementById('f-allday').checked;
      var st=document.getElementById('f-st').value;
      var et=document.getElementById('f-et').value;
      var desc=document.getElementById('f-desc').value;
      var data={title:'['+dept+'] '+title,department:dept,location:loc,description:desc,isAllDay:allDay,
        start:allDay?date+'T00:00:00':date+'T'+st+':00',end:allDay?date+'T23:59:59':date+'T'+et+':00'};
      state.showForm=false;
      if(ev&&ev.id)updateEvent(ev.id,data);
      else createEvent(data);
    }
  },ev?'수정':'추가'));
  if(ev&&ev.id){
    btns.appendChild(h('button',{
      className:'btn',style:{padding:'10px',color:'var(--red)'},
      onClick:function(){if(confirm('이 일정을 삭제할까요?')){state.showForm=false;deleteEvent(ev.id)}}
    },'삭제'));
  }
  form.appendChild(btns);
  modal.appendChild(form);
  overlay.appendChild(modal);
  return overlay;
}

// 부서 관리 (관리자 전용)
// ═══════════════════════════════════════════════════════════
function renderDeptManager(){
  var overlay=h('div',{
    className:'modal-overlay',
    onClick:function(e){if(e.target===e.currentTarget){state.showMgr=false;render()}}
  });
  var modal=h('div',{className:'modal modal-md'});
  var top=h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'14px'}});
  top.appendChild(h('span',{className:'modal-title'},'부서/장소 관리'));
  top.appendChild(h('button',{className:'btn btn-sm',onClick:function(){state.showMgr=false;render()}},'✕'));
  modal.appendChild(top);
  modal.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx3)',marginBottom:'8px'}},'이름·키워드·색상 편집 후 [저장] 버튼을 누르세요'));

  var COLORS=['#5C6BC0','#3949AB','#8E24AA','#0F9D58','#43A047','#1E88E5','#00ACC1','#FB8C00','#F4511E','#00897B','#6D4C41','#F4B400','#DB4437','#7CB342','#C0CA33','#8D6E63','#546E7A','#6A1B9A','#EF6C00','#E91E63'];

  // 기존 부서 목록 — 인라인 편집
  state.departments.forEach(function(d,i){
    var row=h('div',{style:{display:'flex',alignItems:'flex-start',gap:'6px',padding:'8px 0',borderBottom:'1px solid var(--bd)'}});

    // 순서 버튼
    var arrows=h('div',{style:{display:'flex',flexDirection:'column',gap:'1px',paddingTop:'4px'}});
    arrows.appendChild(h('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:'10px',padding:'0 3px',color:'var(--tx3)'},
      onClick:function(){if(i===0)return;var a=state.departments,t=a[i];a[i]=a[i-1];a[i-1]=t;saveDepts();render()}},'▲'));
    arrows.appendChild(h('button',{style:{background:'none',border:'none',cursor:'pointer',fontSize:'10px',padding:'0 3px',color:'var(--tx3)'},
      onClick:function(){if(i===state.departments.length-1)return;var a=state.departments,t=a[i];a[i]=a[i+1];a[i+1]=t;saveDepts();render()}},'▼'));
    row.appendChild(arrows);

    // 편집 영역
    var editBox=h('div',{style:{flex:1,minWidth:0,display:'flex',flexDirection:'column',gap:'4px'}});

    // 이름 + 색상 팔레트
    var nameRow=h('div',{style:{display:'flex',gap:'6px',alignItems:'center',flexWrap:'wrap'}});
    var nameIn=h('input',{className:'form-input',value:d.name,style:{width:'120px',padding:'4px 7px',fontSize:'12px'},placeholder:'부서명'});
    var colorPicker=h('div',{style:{display:'flex',gap:'2px',flexWrap:'wrap',maxWidth:'180px'}});
    COLORS.forEach(function(c){
      (function(cc){
        var dot=h('span',{
          style:{width:'18px',height:'18px',borderRadius:'50%',background:cc,cursor:'pointer',display:'inline-block',
            border:cc===d.color?'2px solid #333':'2px solid transparent'},
          onClick:function(){
            d.color=cc;
            colorPicker.querySelectorAll('span').forEach(function(s){s.style.border='2px solid transparent'});
            this.style.border='2px solid #333';
          }
        });
        colorPicker.appendChild(dot);
      })(c);
    });
    nameRow.appendChild(nameIn);
    nameRow.appendChild(colorPicker);
    editBox.appendChild(nameRow);

    // 키워드
    var kwIn=h('input',{className:'form-input',value:d.keywords.join(', '),
      style:{padding:'3px 7px',fontSize:'11px',color:'var(--tx2)'},placeholder:'키워드 (쉼표 구분)'});
    editBox.appendChild(kwIn);

    // 저장 버튼
    var saveBtn=h('button',{className:'btn btn-sm btn-primary',style:{alignSelf:'flex-start',marginTop:'2px'},
      onClick:function(){
        var newName=nameIn.value.trim();
        if(!newName){showToast('부서명 입력');return;}
        var oldName=d.name;
        d.name=newName;
        d.keywords=kwIn.value.split(',').map(function(k){return k.trim();}).filter(Boolean);
        if(oldName!==newName&&state.activeDepts){
          var idx=state.activeDepts.indexOf(oldName);
          if(idx>=0)state.activeDepts[idx]=newName;
        }
        saveDepts();showToast('저장됨');render();
      }
    },'저장');
    editBox.appendChild(saveBtn);
    row.appendChild(editBox);

    // 삭제
    row.appendChild(h('button',{
      style:{background:'none',border:'none',fontSize:'14px',cursor:'pointer',color:'var(--tx3)',padding:'4px',marginTop:'2px'},
      onClick:function(){
        if(!confirm(d.name+' 삭제?'))return;
        state.departments.splice(i,1);
        if(state.activeDepts)state.activeDepts=state.activeDepts.filter(function(x){return x!==d.name;});
        saveDepts();render();
      }
    },'✕'));
    modal.appendChild(row);
  });

  // 부서 추가
  var addBox=h('div',{style:{background:'var(--bg2)',borderRadius:'8px',padding:'12px',marginTop:'14px'}});
  addBox.appendChild(h('div',{style:{fontSize:'12px',fontWeight:500,marginBottom:'8px'}},'부서 추가'));
  addBox.appendChild(h('input',{className:'form-input',id:'m-name',placeholder:'부서 이름',style:{marginBottom:'6px'}}));
  addBox.appendChild(h('input',{className:'form-input',id:'m-kw',placeholder:'키워드 (쉼표 구분)',style:{marginBottom:'8px'}}));
  var colorRow=h('div',{style:{display:'flex',gap:'3px',flexWrap:'wrap',marginBottom:'8px'}});
  var selectedNewColor={v:'#9C27B0'};
  COLORS.forEach(function(c){
    (function(cc){
      var dot=h('span',{
        style:{width:'22px',height:'22px',borderRadius:'50%',background:cc,cursor:'pointer',
          border:cc===selectedNewColor.v?'2px solid #333':'2px solid transparent',display:'inline-block'},
        onClick:function(){
          selectedNewColor.v=cc;
          colorRow.querySelectorAll('span').forEach(function(s){s.style.border='2px solid transparent'});
          this.style.border='2px solid #333';
        }
      });
      colorRow.appendChild(dot);
    })(c);
  });
  addBox.appendChild(colorRow);
  addBox.appendChild(h('button',{
    className:'btn btn-primary',style:{width:'100%',padding:'8px'},
    onClick:function(){
      var name=document.getElementById('m-name').value.trim();
      if(!name)return;
      var kw=document.getElementById('m-kw').value;
      var keywords=kw?kw.split(',').map(function(k){return k.trim();}).filter(Boolean):[name];
      state.departments.push({name:name,keywords:keywords,color:selectedNewColor.v,order:state.departments.length});
      if(state.activeDepts)state.activeDepts.push(name);
      saveDepts();showToast(name+' 추가됨');render();
    }
  },'추가'));
  modal.appendChild(addBox);

  // 장소 관리
  var locBox=h('div',{style:{background:'var(--bg2)',borderRadius:'8px',padding:'12px',marginTop:'10px'}});
  locBox.appendChild(h('div',{style:{fontSize:'12px',fontWeight:500,marginBottom:'8px'}},'📍 장소 목록'));
  state.locations.forEach(function(loc,i){
    var row2=h('div',{style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'4px'}});
    var locIn=h('input',{className:'form-input',value:loc,style:{flex:1,padding:'4px 7px',fontSize:'12px'}});
    row2.appendChild(locIn);
    row2.appendChild(h('button',{className:'btn btn-sm btn-primary',onClick:function(){
      state.locations[i]=locIn.value.trim();saveLocs();showToast('저장됨');
    }},'저장'));
    row2.appendChild(h('button',{className:'btn btn-sm',style:{color:'var(--red)'},onClick:function(){
      state.locations.splice(i,1);saveLocs();render();
    }},'✕'));
    locBox.appendChild(row2);
  });
  var addLocRow=h('div',{style:{display:'flex',gap:'6px',marginTop:'6px'}});
  addLocRow.appendChild(h('input',{className:'form-input',id:'new-loc',placeholder:'새 장소 이름',style:{flex:1,padding:'4px 7px',fontSize:'12px'}}));
  addLocRow.appendChild(h('button',{className:'btn btn-sm btn-primary',onClick:function(){
    var v=document.getElementById('new-loc').value.trim();
    if(!v)return;
    state.locations.push(v);saveLocs();showToast(v+' 추가');render();
  }},'추가'));
  locBox.appendChild(addLocRow);
  modal.appendChild(locBox);

  overlay.appendChild(modal);
  return overlay;
}
