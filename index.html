<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>경북기계금속고등학교 교사포털</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== 로그인 화면 ===== -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-title">🏫 경북기계금속고등학교</div>
    <div class="login-sub">교사 업무 포털</div>
    <div class="login-form">
      <input type="text" class="form-input" id="loginId" placeholder="아이디 (이름)">
      <input type="password" class="form-input" id="loginPw" placeholder="비밀번호" style="margin-top:8px" onkeydown="if(event.key==='Enter')Auth.login()">
      <button class="btn-login" onclick="Auth.login()">로그인</button>
      <div id="loginErr" class="login-err"></div>
    </div>
  </div>
</div>

<!-- ===== 앱 쉘 ===== -->
<div class="shell" id="shell">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo" onclick="Router.go('home')" style="cursor:pointer">🏫 경북기계금속고등학교</span>
    </div>
    <div class="topbar-right">
      <div style="cursor:pointer" onclick="Router.go('profile')">
        <div class="topbar-name" id="tName"></div>
        <div class="topbar-sub" id="tSub" style="text-decoration:underline dotted;text-underline-offset:2px"></div>
      </div>
      <button class="t-btn" onclick="Auth.changePw()">🔑</button>
      <button class="t-btn" onclick="Auth.logout()">로그아웃</button>
    </div>
  </div>
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat 버전 - 간단) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<!-- 데이터 -->
<script src="data/constants.js"></script>
<script src="data/sheet-loader.js"></script>
<!-- 코어 -->
<script src="js/store.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script src="js/engine.js"></script>
<script src="js/neis.js"></script>
<script src="js/router.js"></script>
<!-- 페이지 -->
<script src="pages/home.js"></script>
<script src="pages/my-timetable.js"></script>
<script src="pages/all-timetable.js"></script>
<script src="pages/swap.js"></script>
<script src="pages/history.js"></script>
<script src="pages/weekly.js"></script>
<script src="pages/meal.js"></script>
<script src="pages/schedule.js"></script>
<script src="pages/tasks.js"></script>
<script src="pages/admin.js"></script>
<script src="pages/profile.js"></script>
<!-- 부트 -->
<script>
(function() {
  var loginScreen = document.getElementById('loginScreen');
  var shell = document.getElementById('shell');
  var originalLoginHTML = loginScreen.innerHTML;
  var started = false;

  function showLogin() {
    loginScreen.innerHTML = originalLoginHTML;
    loginScreen.style.display = 'flex';
    shell.style.display = 'none';
  }

  function showLoading(message) {
    loginScreen.innerHTML =
      '<div class="login-box">' +
        '<div class="login-title">🏫 경북기계금속고등학교</div>' +
        '<div class="login-sub">' + (message || '불러오는 중...') + '</div>' +
      '</div>';
    loginScreen.style.display = 'flex';
    shell.style.display = 'none';
  }

  function showError(message) {
    loginScreen.innerHTML =
      '<div class="login-box">' +
        '<div class="login-title">⚠️ 오류</div>' +
        '<div class="login-sub">' + (message || '불러오기에 실패했습니다.') + '</div>' +
        '<button class="btn-login" onclick="location.reload()">다시 시도</button>' +
      '</div>';
    loginScreen.style.display = 'flex';
    shell.style.display = 'none';
  }

  function startApp() {
    if (started) return;
    started = true;

    try {
      var savedPT = Store.get('pt');
      if (savedPT) PT = savedPT;

      Auth.initAccounts();
      Engine.rebuild();

      if (!Auth.tryAutoLogin()) {
        showLogin();
      }
    } catch (e) {
      console.error('startApp error:', e);
      showError('앱 초기화 중 오류가 발생했습니다.<br>새로고침 후 다시 시도하세요.');
    }
  }

  function backgroundRefreshSheets() {
    SheetLoader.loadAll(function(err) {
      if (err) {
        console.error('background sheet refresh error:', err);
        return;
      }
      try {
        Engine.rebuild();
      } catch (e) {
        console.error('background rebuild error:', e);
      }
    });
  }

  function firstLoadSheets() {
    showLoading('시간표 불러오는 중...');

    SheetLoader.loadAll(function(err) {
      if (err && !Object.keys(TD_A || {}).length && !Object.keys(TD_B || {}).length) {
        console.error('sheet first load error:', err);
        showError('시간표를 불러올 수 없습니다.<br>네트워크를 확인하세요.');
        return;
      }
      startApp();
    });
  }

  try {
    initFirebase();
  } catch (e) {
    console.error('firebase init error:', e);
  }

  var hasCache = false;
  try {
    hasCache = SheetLoader.loadFromCache();
  } catch (e) {
    console.error('cache load error:', e);
    hasCache = false;
  }

  function afterSync() {
    if (hasCache) {
      startApp();
      backgroundRefreshSheets();
    } else {
      firstLoadSheets();
    }
  }

  try {
    Store.syncFromFirebase(function() {
      afterSync();
    });
  } catch (e) {
    console.error('syncFromFirebase error:', e);
    afterSync();
  }
})();
</script>
</body>
</html>
