<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>경북기계금속고 교사포털</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== 로그인 화면 ===== -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div class="login-title">🏫 경북기계금속고</div>
    <div class="login-sub">교사 업무 포털</div>
    <div class="login-form">
      <input type="text" class="form-input" id="loginId" placeholder="아이디 (이름)">
      <input type="password" class="form-input" id="loginPw" placeholder="비밀번호" style="margin-top:8px" onkeydown="if(event.key==='Enter')Auth.login()">
      <button class="btn-login" onclick="Auth.login()">로그인</button>
      <div id="loginErr" class="login-err"></div>
    </div>
  </div>
</div>

<!-- ===== 앱 쉘 ===== -->
<div class="shell" id="shell">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo" onclick="Router.go('home')" style="cursor:pointer">🏫 경북기계금속고</span>
    </div>
    <div class="topbar-right">
      <div style="cursor:pointer" onclick="Router.go('profile')">
        <div class="topbar-name" id="tName"></div>
        <div class="topbar-sub" id="tSub" style="text-decoration:underline dotted;text-underline-offset:2px"></div>
      </div>
      <button class="t-btn" onclick="Auth.changePw()">🔑</button>
      <button class="t-btn" onclick="Auth.logout()">로그아웃</button>
    </div>
  </div>
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (compat 버전 - 간단) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<!-- 데이터 -->
<script src="data/constants.js"></script>
<script src="data/sheet-loader.js"></script>
<!-- 코어 -->
<script src="js/store.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script src="js/engine.js"></script>
<script src="js/neis.js"></script>
<script src="js/router.js"></script>
<!-- 페이지 -->
<script src="pages/home.js"></script>
<script src="pages/my-timetable.js"></script>
<script src="pages/all-timetable.js"></script>
<script src="pages/swap.js"></script>
<script src="pages/history.js"></script>
<script src="pages/weekly.js"></script>
<script src="pages/meal.js"></script>
<script src="pages/schedule.js"></script>
<script src="pages/tasks.js"></script>
<script src="pages/admin.js"></script>
<script src="pages/profile.js"></script>
<!-- 부트 -->
<script>
(function() {
  // 1. Firebase 초기화
  initFirebase();

  // 2. 캐시에서 빠른 로드 (즉시 화면 표시용)
  var hasCache = SheetLoader.loadFromCache();

  function startApp() {
    var savedPT = Store.get('pt');
    if (savedPT) PT = savedPT;
    Auth.initAccounts();
    Engine.rebuild();
    if (!Auth.tryAutoLogin()) {
      document.getElementById('loginScreen').style.display = 'flex';
    }
  }

  // 3. Firebase 동기화
  Store.syncFromFirebase(function() {
    if (hasCache) {
      // 캐시 있으면 바로 앱 시작, 백그라운드에서 시트 갱신
      startApp();
      SheetLoader.loadAll(function() {
        Engine.rebuild(); // 시트 데이터로 조용히 갱신
      });
    } else {
      // 캐시 없으면 시트 로드 후 시작
      document.getElementById('loginScreen').innerHTML = '<div class="login-box"><div class="login-title">🏫 경북기계금속고</div><div class="login-sub">시간표 불러오는 중...</div></div>';
      document.getElementById('loginScreen').style.display = 'flex';
      SheetLoader.loadAll(function(err) {
        if (err && !Object.keys(TD_A).length) {
          document.getElementById('loginScreen').innerHTML = '<div class="login-box"><div class="login-title">⚠️ 오류</div><div class="login-sub">시간표를 불러올 수 없습니다.<br>네트워크를 확인하세요.</div><button class="btn-login" onclick="location.reload()">다시 시도</button></div>';
          return;
        }
        startApp();
      });
    }
  });
})();
</script>
</body>
</html>
