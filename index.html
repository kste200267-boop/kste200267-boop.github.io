<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>경북기계금속고등학교 교사포털</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a73e8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="교사포털">
<link rel="apple-touch-icon" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%231a73e8'/><text y='140' x='20' font-size='140'>🏫</text></svg>">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏫</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
#initScreen{
  position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:9999;gap:12px;
  font-family:'Noto Sans KR',system-ui,sans-serif;
}
#initScreen .logo{font-size:3em}
#initScreen .title{font-size:1.1em;font-weight:700;color:#202124}
#initScreen .sub{font-size:.85em;color:#5f6368}
#initScreen .spinner{
  width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#1a73e8;
  border-radius:50%;animation:spin .8s linear infinite;margin-top:4px;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* PWA 설치 배너 */
#pwaBar{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:8000;
  background:#fff;border-top:1px solid #e0e0e0;box-shadow:0 -2px 12px rgba(0,0,0,.1);
  padding:12px 16px;font-family:'Noto Sans KR',system-ui,sans-serif;
  animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#pwaBar.show{display:block}
.pwa-inner{display:flex;align-items:center;gap:12px;max-width:600px;margin:0 auto}
.pwa-icon{font-size:2em;flex-shrink:0}
.pwa-text{flex:1;min-width:0}
.pwa-title{font-weight:700;font-size:.92em;color:#202124}
.pwa-desc{font-size:.78em;color:#5f6368;margin-top:1px;word-break:keep-all}
.pwa-btn-install{padding:8px 16px;border-radius:8px;border:none;background:#1a73e8;color:#fff;font-size:.83em;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Noto Sans KR',system-ui,sans-serif}
.pwa-btn-install:active{opacity:.85}
.pwa-btn-close{background:none;border:none;font-size:1.3em;cursor:pointer;color:#9aa0a6;padding:0 2px;flex-shrink:0;line-height:1}
/* iOS 안내 */
#iosGuide{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:8000;
  background:#1c1c1e;color:#fff;border-radius:16px 16px 0 0;
  padding:20px 20px 32px;font-family:'Noto Sans KR',system-ui,sans-serif;
  animation:slideUp .3s ease;
}
#iosGuide.show{display:block}
.ios-inner{max-width:400px;margin:0 auto}
.ios-handle{width:36px;height:4px;background:rgba(255,255,255,.3);border-radius:2px;margin:0 auto 16px}
.ios-title{font-weight:700;font-size:.95em;margin-bottom:12px;text-align:center}
.ios-steps{display:flex;flex-direction:column;gap:10px}
.ios-step{display:flex;align-items:center;gap:10px;font-size:.84em;color:rgba(255,255,255,.85)}
.ios-step-num{width:24px;height:24px;border-radius:50%;background:#1a73e8;font-size:.75em;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ios-close{margin-top:16px;width:100%;padding:12px;border-radius:10px;border:none;background:rgba(255,255,255,.15);color:#fff;font-size:.88em;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',system-ui,sans-serif}
</style>
</head>
<body>

<!-- 초기 로딩 스피너 -->
<div id="initScreen">
  <div class="logo">🏫</div>
  <div class="title">경북기계금속고등학교</div>
  <div class="sub">교사 업무 포털</div>
  <div class="spinner"></div>
</div>

<!-- 로그인 화면 -->
<div id="loginScreen" class="login-wrap" style="display:none">
  <div class="login-box">
    <div class="login-title">🏫 경북기계금속고등학교</div>
    <div class="login-sub">교사 업무 포털</div>
    <div class="login-form">
      <input type="text" class="form-input" id="loginId" placeholder="아이디 (이름)" autocomplete="username">
      <input type="password" class="form-input" id="loginPw" placeholder="비밀번호" style="margin-top:8px"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')Auth.login()">
      <button class="btn-login" onclick="Auth.login()">로그인</button>
      <div id="loginErr" class="login-err"></div>
    </div>
  </div>
</div>

<!-- 앱 쉘 -->
<div class="shell" id="shell" style="display:none">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo" onclick="Router.go('home')" style="cursor:pointer">🏫 경북기계금속고등학교</span>
    </div>
    <div class="topbar-right">
      <div style="cursor:pointer" onclick="Router.go('profile')">
        <div class="topbar-name" id="tName"></div>
        <div class="topbar-sub" id="tSub" style="text-decoration:underline dotted;text-underline-offset:2px"></div>
      </div>
      <button class="t-btn" id="pwaInstallBtn" style="display:none" onclick="PWAInstall.trigger()">📲 설치</button>
      <button class="t-btn" onclick="Auth.changePw()">🔑</button>
      <button class="t-btn" onclick="Auth.logout()">로그아웃</button>
    </div>
  </div>
  <div class="sidebar" id="sidebar"></div>
  <div class="content" id="content"></div>
</div>

<div class="toast" id="toast"></div>

<!-- PWA 설치 배너 -->
<div id="pwaBar">
  <div class="pwa-inner">
    <div class="pwa-icon">🏫</div>
    <div class="pwa-text">
      <div class="pwa-title" id="pwaTitle">홈 화면에 추가</div>
      <div class="pwa-desc" id="pwaDesc">앱처럼 빠르게 접근할 수 있습니다</div>
    </div>
    <button class="pwa-btn-install" onclick="PWAInstall.trigger()">설치</button>
    <button class="pwa-btn-close" onclick="PWAInstall.dismiss()">✕</button>
  </div>
</div>

<!-- iOS Safari 안내 -->
<div id="iosGuide">
  <div class="ios-inner">
    <div class="ios-handle"></div>
    <div class="ios-title">📲 홈 화면에 추가하기</div>
    <div class="ios-steps">
      <div class="ios-step"><div class="ios-step-num">1</div><div>하단 가운데 <b>공유 버튼 ⬆️</b>을 탭하세요</div></div>
      <div class="ios-step"><div class="ios-step-num">2</div><div><b>"홈 화면에 추가 ➕"</b>를 선택하세요</div></div>
      <div class="ios-step"><div class="ios-step-num">3</div><div>오른쪽 위 <b>"추가"</b>를 탭하면 완료!</div></div>
    </div>
    <button class="ios-close" onclick="PWAInstall.dismissIos()">확인</button>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<!-- 데이터 -->
<script src="data/constants.js"></script>
<script src="data/sheet-loader.js"></script>
<!-- 코어 -->
<script src="js/store.js"></script>
<script src="js/toast.js"></script>
<script src="js/auth.js"></script>
<script src="js/engine.js"></script>
<script src="js/neis.js"></script>
<script src="js/router.js"></script>
<!-- 페이지 -->
<script src="pages/home.js"></script>
<script src="pages/my-timetable.js"></script>
<script src="pages/all-timetable.js"></script>
<script src="pages/swap.js"></script>
<script src="pages/history.js"></script>
<script src="pages/weekly.js"></script>
<script src="pages/meal.js"></script>
<script src="pages/schedule.js"></script>
<script src="pages/tasks.js"></script>
<script src="pages/admin.js"></script>
<script src="pages/profile.js"></script>
  <script src="pages/roster.js"></script>

<script>
// ═══════════════════
// PWA 설치 모듈
// ═══════════════════
var PWAInstall=(function(){
  var deferredPrompt=null;
  var DISMISS_KEY='pwa-dismissed-v1';

  function detect(){
    var ua=navigator.userAgent;
    var env={
      isIos:/iPad|iPhone|iPod/.test(ua)&&!window.MSStream,
      isAndroid:/Android/.test(ua),
      isSamsung:/SamsungBrowser/.test(ua),
      isWhale:/Whale/.test(ua),
      isEdge:/Edg\//.test(ua),
      isChrome:/Chrome/.test(ua)&&!/Edg|OPR|Whale|SamsungBrowser/.test(ua),
      isSafari:/Safari/.test(ua)&&!/Chrome|CriOS/.test(ua),
      isStandalone:(window.navigator.standalone===true)||window.matchMedia('(display-mode: standalone)').matches
    };
    env.device=env.isIos?(/iPad/.test(ua)?'아이패드':'아이폰'):(env.isAndroid?'갤럭시(안드로이드)':'PC');
    env.browser=env.isWhale?'웨일':env.isEdge?'엣지':env.isSamsung?'삼성 인터넷':env.isChrome?'크롬':env.isSafari?'Safari':'브라우저';
    return env;
  }

  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferredPrompt=e;
    if(localStorage.getItem(DISMISS_KEY))return;
    setTimeout(showBanner,1500);
  });
  window.addEventListener('appinstalled',function(){
    hideBanner();document.getElementById('iosGuide').classList.remove('show');
    deferredPrompt=null;
    var btn=document.getElementById('pwaInstallBtn');if(btn)btn.style.display='none';
    toast('앱이 설치되었습니다! 🎉');
  });

  function showBanner(){
    var env=detect();
    if(env.isStandalone)return;
    var bar=document.getElementById('pwaBar');if(!bar)return;
    document.getElementById('pwaTitle').textContent='📲 '+env.device+'에 앱 설치';
    document.getElementById('pwaDesc').textContent=env.browser+'에서 홈 화면에 추가하면 앱처럼 빠르게 접근 가능합니다';
    bar.classList.add('show');
    var btn=document.getElementById('pwaInstallBtn');if(btn)btn.style.display='';
  }
  function hideBanner(){var bar=document.getElementById('pwaBar');if(bar)bar.classList.remove('show')}

  function trigger(){
    var env=detect();
    if(env.isStandalone){toast('이미 설치되어 있습니다');return}
    if(deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(r){
        if(r.outcome==='accepted')toast('설치 완료! 홈 화면을 확인하세요 🎉');
        deferredPrompt=null;hideBanner();
        var btn=document.getElementById('pwaInstallBtn');if(btn)btn.style.display='none';
      });
    }else if(env.isIos&&env.isSafari){
      hideBanner();
      document.getElementById('iosGuide').classList.add('show');
    }else{
      toast('주소창 오른쪽 설치 아이콘 또는 메뉴 → "홈 화면에 추가"를 선택하세요');
    }
  }

  function checkAfterLogin(){
    var env=detect();
    if(env.isStandalone||localStorage.getItem(DISMISS_KEY))return;
    if(env.isIos&&env.isSafari){
      var btn=document.getElementById('pwaInstallBtn');if(btn)btn.style.display='';
    }
    if(deferredPrompt)setTimeout(showBanner,800);
  }

  return{
    trigger:trigger,
    dismiss:function(){localStorage.setItem(DISMISS_KEY,'1');hideBanner();var btn=document.getElementById('pwaInstallBtn');if(btn)btn.style.display='none'},
    dismissIos:function(){localStorage.setItem(DISMISS_KEY,'1');document.getElementById('iosGuide').classList.remove('show')},
    checkAfterLogin:checkAfterLogin
  };
})();

// ═══════════════════
// 앱 부트
// ═══════════════════
(function(){
  var initScreen=document.getElementById('initScreen');
  var loginScreen=document.getElementById('loginScreen');
  var shell=document.getElementById('shell');
  var started=false;

  function hideInit(){if(initScreen)initScreen.style.display='none';}

  function showLogin(){
    hideInit();
    loginScreen.style.display='flex';
    shell.style.display='none';
  }

  function showLoading(msg){
    if(initScreen){
      var sub=initScreen.querySelector('.sub');
      if(sub)sub.textContent=msg||'불러오는 중...';
      initScreen.style.display='flex';
    }
    loginScreen.style.display='none';
    shell.style.display='none';
  }

  function showError(msg){
    hideInit();
    loginScreen.innerHTML='<div class="login-box"><div class="login-title">⚠️ 오류</div><div class="login-sub">'+(msg||'불러오기 실패')+'</div><button class="btn-login" onclick="location.reload()">다시 시도</button></div>';
    loginScreen.style.display='flex';
  }

  function startApp(){
    if(started)return;
    started=true;
    try{
      var savedPT=Store.get('pt');if(savedPT)PT=savedPT;
      Auth.initAccounts();
      Engine.rebuild();
if(!Auth.tryAutoLogin()){
  showLogin();
}else{
  hideInit(); // ★ 이 한 줄 추가
  setTimeout(function(){PWAInstall.checkAfterLogin();},2000);
}
    }catch(e){
      console.error('startApp error:',e);
      showError('앱 초기화 중 오류가 발생했습니다.<br>새로고침 후 다시 시도하세요.');
    }
  }

  function backgroundRefreshSheets(){
    SheetLoader.loadAll(function(err){
      if(err){console.error('bg refresh:',err);return;}
      try{Engine.rebuild();}catch(e){}
    });
  }

  function firstLoadSheets(){
    showLoading('시간표 불러오는 중...');
    SheetLoader.loadAll(function(err){
      if(err&&!Object.keys(TD_A||{}).length&&!Object.keys(TD_B||{}).length){
        showError('시간표를 불러올 수 없습니다.<br>네트워크를 확인하세요.');
        return;
      }
      startApp();
    });
  }

  // Firebase 초기화
  try{initFirebase();}catch(e){console.error('firebase init error:',e);}

  // 로컬 캐시 로드
  var hasCache=false;
  try{hasCache=SheetLoader.loadFromCache();}catch(e){}

  // ★ 핵심 수정: sync 결과와 무관하게 한 번만 startApp 진입
  var syncDone=false;
  var syncTimer=null;

  function proceed(){
    if(syncDone)return;
    syncDone=true;
    if(syncTimer){clearTimeout(syncTimer);syncTimer=null;}

    if(hasCache){
      startApp();                  // 캐시 있으면 즉시 시작
      backgroundRefreshSheets();   // 백그라운드 갱신
    }else{
      firstLoadSheets();           // 캐시 없으면 시트 로드 후 시작
    }
  }

  // 최대 5초 대기
  syncTimer=setTimeout(function(){
    console.warn('Firebase sync timeout - proceeding');
    proceed();
  },5000);

  try{
    Store.syncFromFirebase(function(){proceed();});
  }catch(e){
    console.error('syncFromFirebase error:',e);
    proceed();
  }

  // Service Worker 등록
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js')
      .then(function(){console.log('SW registered');})
      .catch(function(e){console.error('SW failed:',e);});
  }
})();
</script>
</body>
</html>
